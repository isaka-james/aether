name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

# Cancel superseded runs on the same ref so a quick succession of pushes doesn't queue up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      # Match the runtime the backend actually ships on (see backend/Dockerfile: python:3.12-slim),
      # so CI exercises the same dependency resolution as production.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      # libsndfile backs the `soundfile` import pulled in by the TTS module.
      - name: Install system libraries
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libsndfile1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      # Syntax-check every module, including ones the tests don't import (stt, main, …).
      - name: Byte-compile the package
        run: python -m compileall -q app

      - name: Run tests
        run: pytest
