# Aether Dockerized backend. The host agent runs natively on the host; the reasoning LLM is
# whatever you configure (DeepSeek, OpenAI, Claude, or a local model). The backend publishes
# one host port (AETHER_WEB_PORT, default 8473) for the web UI + API, and is backed by Postgres
# (history, favourites, preferences) and Redis (follow-up context, caching, live notifications).
# Both are optional: if they are down the backend degrades gracefully, but compose starts them.
services:
  backend:
    build: ./backend
    container_name: aether-backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true   # processes in the container can never gain extra privileges
    ports:
      # Host port is deliberately uncommon so it does not clash with the usual dev ports
      # (3000, 5000, 8000, 8080, ...). Change AETHER_WEB_PORT in .env to anything you like.
      # The container still serves on 8000 internally; only the host side is remapped.
      - "${AETHER_WEB_PORT:-8473}:8000"   # open the app at http://localhost:8473
    env_file:
      - .env
    environment:
      # Point the app at the sibling services (override in .env if you must).
      AETHER_DATABASE_URL: ${AETHER_DATABASE_URL:-postgresql://aether:${POSTGRES_PASSWORD:-aether}@db:5432/aether}
      AETHER_REDIS_URL: ${AETHER_REDIS_URL:-redis://redis:6379/0}
      # So the agent knows the correct local date/time. Defaults to the host's $TZ; you can
      # also set AETHER_TZ in .env to your IANA zone (e.g. Europe/Berlin, America/New_York).
      TZ: ${TZ:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - aether-models:/models       # caches Whisper + Kokoro models across restarts
      - ./backend/web:/app/web:ro   # serve the web client live (edit → refresh, no rebuild)
    extra_hosts:
      # Lets the container reach the host agent (8474 by default) on the host.
      - "host.docker.internal:host-gateway"

  db:
    image: postgres:16-alpine
    container_name: aether-db
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: aether
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aether}
      POSTGRES_DB: aether
    volumes:
      - aether-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aether -d aether"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: aether-redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # Small footprint on a 2-core box: cap memory and evict the least-recently-used keys
    # (context/cache are disposable; nothing here must survive memory pressure).
    command: ["redis-server", "--save", "", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  aether-models:
  aether-db:
